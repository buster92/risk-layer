services:
  - type: web
    name: movecred-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: LOG_JSON
        value: true
      - key: DATABASE_URL
        sync: false  # set manually in dashboard — Supabase connection string
      - key: SECRET_KEY
        generateValue: true
      - key: MARKET_DATA_PROVIDER
        value: yfinance
      - key: MODEL_ARTIFACTS_PATH
        value: app/models/artifacts
      - key: ALLOW_ORIGINS
        value: '["*"]'
